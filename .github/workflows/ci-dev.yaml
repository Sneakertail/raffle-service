name: ci-dev

on:
  push:
    branches: [dev]

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Validate security configuration
        shell: bash
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          missing=()
          [ -z "$SONAR_HOST_URL" ] && missing+=("SONAR_HOST_URL variable")
          [ -z "$SONAR_TOKEN" ] && missing+=("SONAR_TOKEN secret")
          [ -z "$SNYK_TOKEN" ] && missing+=("SNYK_TOKEN secret")
          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing required CI configuration:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run lint
        run: npm run lint --if-present

      - name: Sonar scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,build/**,coverage/**,.git/**

      - name: Snyk dependency scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --all-projects

  build-and-push-dev:
    runs-on: ubuntu-latest
    needs: quality-and-security
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ghcr.io/sneakertail/${{ github.event.repository.name }}:scan-${{ github.sha }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ghcr.io/sneakertail/${{ github.event.repository.name }}:scan-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/sneakertail/${{ github.event.repository.name }}:dev
            ghcr.io/sneakertail/${{ github.event.repository.name }}:dev-${{ github.sha }}
