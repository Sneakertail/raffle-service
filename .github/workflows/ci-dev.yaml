name: ci-dev

on:
  push:
    branches: [dev]

env:
  SERVICE_NAME: ${{ github.event.repository.name }}
  IMAGE_REPOSITORY: ghcr.io/sneakertail/${{ github.event.repository.name }}
  IMAGE_TAG: ${{ github.sha }}
  CHART_VALUES_FILE: charts/${{ github.event.repository.name }}/values-dev.yaml

jobs:
  # Validate, scan, build, and publish the dev image
  verify-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      failure_reason: ${{ steps.outcome.outputs.failure_reason }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # CI prerequisites
      - id: validate
        name: Validate CI configuration
        shell: bash
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          missing=()
          [ -z "$SONAR_HOST_URL" ] && missing+=("SONAR_HOST_URL variable")
          [ -z "$SONAR_TOKEN" ] && missing+=("SONAR_TOKEN secret")
          [ -z "$SNYK_TOKEN" ] && missing+=("SNYK_TOKEN secret")
          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing required CI configuration:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      # Code quality and security
      - id: sonar
        name: Sonar scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,build/**,coverage/**,.git/**

      - id: sonar-gate
        name: Sonar quality gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - id: install
        name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - id: snyk
        name: Snyk dependency scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --all-projects

      # Container build and publish
      - uses: docker/setup-buildx-action@v3

      - id: build-scan
        name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE_REPOSITORY }}:scan-${{ github.sha }}

      - id: trivy
        name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_REPOSITORY }}:scan-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - id: login
        name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: push
        name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}

      # Failure summary for notifications
      - id: outcome
        if: always()
        name: Capture failure reason
        shell: bash
        run: |
          reason=""
          if [ "${{ steps.validate.outcome }}" = "failure" ]; then
            reason="[config] missing required CI configuration (SONAR_HOST_URL, SONAR_TOKEN, or SNYK_TOKEN)."
          elif [ "${{ steps.sonar.outcome }}" = "failure" ]; then
            reason="[sonar-scan] Sonar scan failed."
          elif [ "${{ steps.sonar-gate.outcome }}" = "failure" ]; then
            reason="[sonar-quality-gate] Sonar quality gate failed."
          elif [ "${{ steps.install.outcome }}" = "failure" ]; then
            reason="[dependencies] dependency installation failed."
          elif [ "${{ steps.snyk.outcome }}" = "failure" ]; then
            reason="[snyk] Snyk dependency scan failed."
          elif [ "${{ steps.build-scan.outcome }}" = "failure" ]; then
            reason="[docker-build] Docker build for security scanning failed."
          elif [ "${{ steps.trivy.outcome }}" = "failure" ]; then
            reason="[trivy] Trivy image scan found blocking vulnerabilities."
          elif [ "${{ steps.login.outcome }}" = "failure" ]; then
            reason="[ghcr-login] GHCR login failed."
          elif [ "${{ steps.push.outcome }}" = "failure" ]; then
            reason="[image-push] Docker image push failed."
          fi
          echo "failure_reason=$reason" >> "$GITHUB_OUTPUT"

  # Update the dev chart values after the image is published
  deploy:
    runs-on: ubuntu-latest
    needs: verify-and-publish
    if: needs.verify-and-publish.result == 'success'
    permissions:
      contents: read
    outputs:
      failure_reason: ${{ steps.outcome.outputs.failure_reason }}
    steps:
      # Charts checkout
      - id: checkout-charts
        name: Checkout charts repository
        uses: actions/checkout@v4
        with:
          repository: Sneakertail/sneakertail-charts
          ref: dev
          token: ${{ secrets.CHARTS_REPO_TOKEN }}
          path: charts-repo

      # Values update
      - id: update-values
        name: Update Helm values
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: yq -i '.image.tag = strenv(IMAGE_TAG)' "charts-repo/${CHART_VALUES_FILE}"

      # Commit and push
      - id: commit-values
        name: Commit updated Helm values
        shell: bash
        working-directory: charts-repo
        run: |
          git config user.name "sneakertail-ci"
          git config user.email "ci@sneakertail.local"
          if git diff --quiet -- "$CHART_VALUES_FILE"; then
            echo "No chart value changes to commit."
            exit 0
          fi
          git add "$CHART_VALUES_FILE"
          git commit -m "chore: promote $SERVICE_NAME to $IMAGE_TAG"
          git push origin HEAD:dev

      # Failure summary for notifications
      - id: outcome
        if: always()
        name: Capture failure reason
        shell: bash
        run: |
          reason=""
          if [ "${{ steps.checkout-charts.outcome }}" = "failure" ]; then
            reason="[charts-checkout] checkout of sneakertail-charts failed."
          elif [ "${{ steps.update-values.outcome }}" = "failure" ]; then
            reason="[yq-update] updating the Helm values file failed."
          elif [ "${{ steps.commit-values.outcome }}" = "failure" ]; then
            reason="[charts-push] commit or push of the Helm values update failed."
          fi
          echo "failure_reason=$reason" >> "$GITHUB_OUTPUT"

  # Send one email for either success or failure
  notify:
    runs-on: ubuntu-latest
    needs:
      - verify-and-publish
      - deploy
    if: always()
    permissions:
      contents: read
    steps:
      # SMTP configuration
      - id: smtp-config
        name: Check SMTP configuration
        shell: bash
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
          SMTP_TO: ${{ vars.SMTP_TO }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          missing=()
          [ -z "$SMTP_HOST" ] && missing+=("SMTP_HOST variable")
          [ -z "$SMTP_PORT" ] && missing+=("SMTP_PORT variable")
          [ -z "$SMTP_FROM" ] && missing+=("SMTP_FROM variable")
          [ -z "$SMTP_TO" ] && missing+=("SMTP_TO variable")
          [ -z "$SMTP_USERNAME" ] && missing+=("SMTP_USERNAME secret")
          [ -z "$SMTP_PASSWORD" ] && missing+=("SMTP_PASSWORD secret")
          if [ ${#missing[@]} -gt 0 ]; then
            printf 'SMTP notification skipped. Missing:\n'
            printf ' - %s\n' "${missing[@]}"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      # Email content
      - id: compose
        if: steps.smtp-config.outputs.enabled == 'true'
        name: Build email content
        shell: bash
        env:
          DEPLOY_ENV: dev
          VERIFY_RESULT: ${{ needs.verify-and-publish.result }}
          VERIFY_REASON: ${{ needs.verify-and-publish.outputs.failure_reason }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOY_REASON: ${{ needs.deploy.outputs.failure_reason }}
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          failures=()

          if [ "$VERIFY_RESULT" = "failure" ]; then
            failures+=("${VERIFY_REASON:-[verify-and-publish] job failed.}")
          fi

          if [ "$DEPLOY_RESULT" = "failure" ]; then
            failures+=("${DEPLOY_REASON:-[deploy] job failed.}")
          elif [ "$DEPLOY_RESULT" = "skipped" ] && [ "$VERIFY_RESULT" != "success" ]; then
            failures+=("[deploy] chart update skipped because the image pipeline did not complete successfully.")
          fi

          if [ ${#failures[@]} -eq 0 ]; then
            subject="[Sneakertail][dev] SUCCESS - ${SERVICE_NAME} ${IMAGE_TAG}"
            {
              echo "body<<EOF"
              echo "Sneakertail CI succeeded for ${SERVICE_NAME}."
              echo
              echo "Environment: dev"
              echo "Image: ${IMAGE_REPOSITORY}:${IMAGE_TAG}"
              echo "Values file updated: ${CHART_VALUES_FILE}"
              echo "Commit: ${GITHUB_SHA}"
              echo "Actor: ${GITHUB_ACTOR}"
              echo "Run: ${run_url}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            subject="[Sneakertail][dev] FAILURE - ${SERVICE_NAME} ${IMAGE_TAG}"
            {
              echo "body<<EOF"
              echo "Sneakertail CI failed for ${SERVICE_NAME}."
              echo
              echo "Environment: dev"
              echo "Commit: ${GITHUB_SHA}"
              echo "Actor: ${GITHUB_ACTOR}"
              echo "Run: ${run_url}"
              echo
              echo "Failure details:"
              for failure in "${failures[@]}"; do
                echo "- ${failure}"
              done
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

          echo "subject=${subject}" >> "$GITHUB_OUTPUT"

      # Email send
      - name: Send notification email
        if: steps.smtp-config.outputs.enabled == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ vars.SMTP_HOST }}
          server_port: ${{ vars.SMTP_PORT }}
          secure: ${{ vars.SMTP_SECURE }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ steps.compose.outputs.subject }}
          to: ${{ vars.SMTP_TO }}
          from: ${{ vars.SMTP_FROM }}
          body: ${{ steps.compose.outputs.body }}
