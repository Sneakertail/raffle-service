apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: raffle-service
  namespace: dev
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: raffle-service
  strategy:
    blueGreen:
      activeService: raffle-service-active
      previewService: raffle-service-preview
      autoPromotionEnabled: false
      previewReplicaCount: 1
      scaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app: raffle-service
    spec:
      containers:
        - name: raffle-service
          image: ghcr.io/sneakertail/raffle-service:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3003
          envFrom:
            - configMapRef:
                name: raffle-service-config
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

